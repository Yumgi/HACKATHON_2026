---
- name: FreeIPA — Installation et configuration
  hosts: identity
  become: true
  roles:
    - role: freeipa
      tags: [freeipa, identity]

  post_tasks:
    - name: Vérifier que le service IPA répond
      uri:
        url: "https://{{ freeipa_ip }}/ipa/ui/"
        validate_certs: false
        status_code: 200
      retries: 5
      delay: 10
      tags: verify

    - name: Créer les zones DNS et enregistrements pour Traefik
      include_tasks: ../roles/freeipa/tasks/dns_traefik.yml
      tags: [dns, traefik]
