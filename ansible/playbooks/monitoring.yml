---
- name: Prometheus — Métriques et alertes (Debian 12 LXC)
  hosts: prometheus
  become: true

  roles:
    - role: prometheus
      tags: [prometheus, monitoring]

  post_tasks:
    - name: Vérifier Prometheus healthy
      uri:
        url: "http://localhost:9090/-/healthy"
        status_code: 200
      retries: 10
      delay: 3
      tags: verify

- name: Grafana — Dashboards (Ubuntu 22.04 LXC)
  hosts: grafana
  become: true

  roles:
    - role: grafana
      tags: [grafana, monitoring]

  post_tasks:
    - name: Vérifier Grafana API health
      uri:
        url: "http://localhost:3000/api/health"
        status_code: 200
      retries: 15
      delay: 5
      tags: verify
