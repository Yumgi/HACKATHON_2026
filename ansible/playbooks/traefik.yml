---
- name: Traefik — Reverse proxy HTTPS + Step-CA PKI privée
  hosts: proxy
  become: true

  roles:
    - role: traefik
      tags: [traefik, proxy]

  post_tasks:
    - name: Vérifier Traefik healthcheck
      uri:
        url: "http://{{ traefik_ip }}:8080/ping"
        status_code: 200
      retries: 6
      delay: 5
      tags: verify
