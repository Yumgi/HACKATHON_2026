---
# Déploiement Bareos — sauvegarde ACME Corp
#
# Ordre d'exécution :
#   1. bareos_clients  → installe bareos-filedaemon sur chaque machine à sauvegarder
#   2. bareos_servers  → installe Director + Storage, génère la config et démarre les services
#   3. Post-vérification → lance un job de backup de test via bconsole
#
# Usage : ansible-playbook playbooks/backup.yml

# ── 1. File Daemons sur les clients ──────────────────────────────────────────
- name: Bareos — File Daemons sur les clients
  hosts: bareos_clients
  become: true
  vars:
    bareos_director_name: bareos-dir
    bareos_fd_password:   "{{ vault_bareos_fd_password }}"
    bareos_fd_conf_path:  /etc/bareos/bareos-fd.d
  roles:
    - role: bareos_client
      tags: [bareos, client]

# ── 2. Serveur Bareos (Director + Storage + WebUI) ───────────────────────────
- name: Bareos — Serveur (Director + Storage) sur Ubuntu 22.04 LXC
  hosts: bareos_servers
  become: true
  vars:
    bareos_fd_password:        "{{ vault_bareos_fd_password }}"
    bareos_dir_conf_path:      /etc/bareos/bareos-dir.d
    bareos_manual_scripts_path: /usr/local/bin
    bareos_schedule_name:      WeeklyCycle
    bareos_full_pool_name:     FullPool
    bareos_inc_pool_name:      IncPool
    bareos_clients:
      - name:         postgres-fd
        address:      "{{ postgresql_ip }}"
        password:     "{{ vault_bareos_fd_password }}"
        backup_paths:
          - /var/backups/postgresql
          - /opt/restore-proof
  roles:
    - role: bareos_server
      tags: [bareos, server]

# ── 3. Vérification : backup de test ─────────────────────────────────────────
- name: Bareos — Test du backup PostgreSQL
  hosts: bareos_servers
  become: true
  tags: [bareos, verify]
  tasks:
    - name: Lancer un job de backup Full postgres-fd
      shell: |
        echo -e "run job=postgres-fd-backup level=Full yes\nwait\nstatus dir\nquit" \
          | bconsole -c /etc/bareos/bconsole.conf
      register: backup_result
      changed_when: false
      failed_when: "'Error' in backup_result.stdout or backup_result.rc != 0"

    - name: Résultat du backup
      debug:
        var: backup_result.stdout_lines
