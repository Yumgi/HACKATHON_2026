---
# Distribue le CA interne ACME Corp sur tous les serveurs du parc.
# À lancer après le playbook traefik (le CA doit déjà exister sur Traefik).
#
# Usage : ansible-playbook playbooks/distribute_ca.yml

- name: Récupérer le CA depuis Traefik
  hosts: proxy
  become: true
  tasks:
    - name: Slurp du CA interne
      slurp:
        src: /opt/traefik/certs/ca.crt
      register: acme_root_ca

    - name: Sauvegarder le CA localement
      copy:
        content: "{{ acme_root_ca.content | b64decode }}"
        dest: "{{ playbook_dir }}/../../acme-corp-ca.crt"
      delegate_to: localhost
      become: false

- name: Installer le CA sur tous les serveurs
  hosts: servers
  become: true
  vars:
    ca_content: "{{ hostvars[groups['proxy'][0]]['acme_root_ca']['content'] | b64decode }}"
  tasks:
    - name: Copier le CA dans le store système
      copy:
        content: "{{ ca_content }}"
        dest: /usr/local/share/ca-certificates/acme-corp-ca.crt
        mode: "0644"
      register: ca_copy

    - name: Mettre à jour le store de CAs (Debian/Ubuntu)
      command: update-ca-certificates
      when:
        - ca_copy.changed
        - ansible_os_family == "Debian"
      changed_when: true

    - name: Mettre à jour le store de CAs (RedHat/Rocky)
      command: update-ca-trust extract
      when:
        - ca_copy.changed
        - ansible_os_family == "RedHat"
      changed_when: true
