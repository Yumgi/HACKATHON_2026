---
- name: Installer openssl et apache2-utils
  apt:
    name:
      - openssl
      - apache2-utils
      - curl
    state: present
    update_cache: true
  tags: install

# ── Traefik binaire ────────────────────────────────────────────────────────────

- name: Télécharger le binaire Traefik v3.1.7
  get_url:
    url: "https://github.com/traefik/traefik/releases/download/v3.1.7/traefik_v3.1.7_linux_amd64.tar.gz"
    dest: /tmp/traefik.tar.gz
    mode: "0644"
  tags: install

- name: Extraire le binaire Traefik
  unarchive:
    src: /tmp/traefik.tar.gz
    dest: /usr/local/bin
    include: [traefik]
    remote_src: true
    mode: "0755"
  tags: install

# ── Répertoires ────────────────────────────────────────────────────────────────

- name: Créer les répertoires Traefik
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /opt/traefik
    - /opt/traefik/config
    - /opt/traefik/certs
    - /opt/traefik/logs
  tags: configure

# ── PKI interne — CA + wildcard cert ──────────────────────────────────────────

- name: Générer la clé du CA interne
  command: openssl genrsa -out /opt/traefik/certs/ca.key 4096
  args:
    creates: /opt/traefik/certs/ca.key
  tags: [configure, pki]

- name: Générer le certificat CA (10 ans)
  command: >-
    openssl req -new -x509 -days 3650
    -key /opt/traefik/certs/ca.key
    -out /opt/traefik/certs/ca.crt
    -subj "/CN=ACME Corp Internal CA/O=ACME Corp/C=FR"
  args:
    creates: /opt/traefik/certs/ca.crt
  tags: [configure, pki]

- name: Déployer le fichier de config SAN wildcard
  copy:
    dest: /opt/traefik/certs/san.cnf
    content: |
      [req]
      req_extensions = v3_req
      distinguished_name = req_distinguished_name
      [req_distinguished_name]
      [v3_req]
      subjectAltName = @alt_names
      basicConstraints = CA:FALSE
      keyUsage = digitalSignature, keyEncipherment
      extendedKeyUsage = serverAuth
      [alt_names]
      DNS.1 = *.{{ domain_ext }}
      DNS.2 = {{ domain_ext }}
      DNS.3 = *.{{ domain_lan }}
      DNS.4 = {{ domain_lan }}
    mode: "0644"
  tags: [configure, pki]

- name: Générer la clé du certificat wildcard
  command: openssl genrsa -out /opt/traefik/certs/wildcard.key 2048
  args:
    creates: /opt/traefik/certs/wildcard.key
  tags: [configure, pki]

- name: Générer la CSR wildcard
  command: >-
    openssl req -new
    -key /opt/traefik/certs/wildcard.key
    -out /opt/traefik/certs/wildcard.csr
    -subj "/CN=*.{{ domain_ext }}/O=ACME Corp/C=FR"
    -config /opt/traefik/certs/san.cnf
  args:
    creates: /opt/traefik/certs/wildcard.csr
  tags: [configure, pki]

- name: Signer le certificat wildcard avec le CA (2 ans)
  command: >-
    openssl x509 -req -days 730
    -in /opt/traefik/certs/wildcard.csr
    -CA /opt/traefik/certs/ca.crt
    -CAkey /opt/traefik/certs/ca.key
    -CAcreateserial
    -out /opt/traefik/certs/wildcard.crt
    -extensions v3_req
    -extfile /opt/traefik/certs/san.cnf
  args:
    creates: /opt/traefik/certs/wildcard.crt
  tags: [configure, pki]

- name: Récupérer le CA root en local (à importer dans les navigateurs)
  fetch:
    src: /opt/traefik/certs/ca.crt
    dest: "{{ playbook_dir }}/../../acme-corp-ca.crt"
    flat: true
  tags: [configure, pki]

# ── Config Traefik ─────────────────────────────────────────────────────────────

- name: Déployer traefik.yml (config statique)
  template:
    src: traefik.yml.j2
    dest: /opt/traefik/traefik.yml
    mode: "0644"
  notify: restart traefik
  tags: configure

- name: Déployer la config dynamique des routes
  template:
    src: dynamic.yml.j2
    dest: /opt/traefik/config/dynamic.yml
    mode: "0644"
  notify: restart traefik
  tags: configure

- name: Générer le fichier htpasswd
  command: >-
    htpasswd -cbB /opt/traefik/config/.htpasswd
    {{ traefik_dashboard_user }}
    {{ traefik_dashboard_password }}
  no_log: true
  changed_when: true
  tags: configure

# ── Systemd ────────────────────────────────────────────────────────────────────

- name: Créer le service systemd Traefik
  copy:
    dest: /etc/systemd/system/traefik.service
    content: |
      [Unit]
      Description=Traefik reverse proxy
      After=network.target
      Wants=network.target

      [Service]
      Type=simple
      ExecStart=/usr/local/bin/traefik --configFile=/opt/traefik/traefik.yml
      WorkingDirectory=/opt/traefik
      Restart=always
      RestartSec=5
      LimitNOFILE=1048576

      [Install]
      WantedBy=multi-user.target
    mode: "0644"
  notify: restart traefik
  tags: configure

- name: Activer et redémarrer Traefik (applique la nouvelle config)
  systemd:
    name: traefik
    state: restarted
    enabled: true
    daemon_reload: true
  tags: [configure, restart]

- name: Attendre que Traefik réponde sur :8080
  uri:
    url: "http://{{ traefik_ip }}:8080/ping"
    status_code: 200
  retries: 10
  delay: 3
  register: traefik_ping
  until: traefik_ping.status == 200
  tags: [configure, restart]

- name: Vérifier que les routes sont chargées
  uri:
    url: "http://{{ traefik_ip }}:8080/api/http/routers"
    status_code: 200
  register: traefik_routers
  tags: [configure, restart]

- name: Afficher le nombre de routes actives
  debug:
    msg: "Traefik opérationnel — {{ (traefik_routers.json | length) }} router(s) chargé(s)"
  tags: [configure, restart]
