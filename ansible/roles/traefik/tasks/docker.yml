---
# ── Sysctls requis pour Docker dans LXC Proxmox ───────────────────────────────
# net.ipv4.ip_unprivileged_port_start=0 : permet à runc de démarrer des
# containers sans que le kernel refuse l'accès au sysctl réseau.
# Doit être fait AVANT l'installation de Docker.

- name: Créer /etc/sysctl.d/99-docker-lxc.conf
  copy:
    dest: /etc/sysctl.d/99-docker-lxc.conf
    content: |
      net.ipv4.ip_unprivileged_port_start=0
      net.ipv4.conf.all.forwarding=1
      net.ipv4.conf.default.forwarding=1
    mode: "0644"

- name: Appliquer uniquement nos sysctls (évite les erreurs LXC sur les fichiers système)
  command: sysctl -p /etc/sysctl.d/99-docker-lxc.conf
  changed_when: false

# ── Dépendances Docker ────────────────────────────────────────────────────────

- name: Créer /etc/apt/keyrings
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Installer les dépendances Docker
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true

- name: Ajouter la clé GPG Docker
  apt_key:
    url: https://download.docker.com/linux/debian/gpg
    keyring: /etc/apt/keyrings/docker.gpg
    state: present

- name: Ajouter le dépôt Docker
  apt_repository:
    repo: >-
      deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg]
      https://download.docker.com/linux/debian
      {{ ansible_distribution_release }} stable
    filename: docker
    state: present

- name: Installer Docker Engine + Compose plugin
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true

# ── Daemon Docker — configuration pour LXC ────────────────────────────────────

- name: Créer /etc/docker
  file:
    path: /etc/docker
    state: directory
    mode: "0755"

- name: Configurer le daemon Docker pour LXC (overlay2, pas de seccomp strict)
  copy:
    dest: /etc/docker/daemon.json
    content: |
      {
        "storage-driver": "overlay2",
        "iptables": true,
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "10m",
          "max-file": "3"
        }
      }
    mode: "0644"
  notify: restart docker

- name: Démarrer et activer Docker
  systemd:
    name: docker
    state: started
    enabled: true
    daemon_reload: true
