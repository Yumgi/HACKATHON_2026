---
- name: Télécharger Promtail
  get_url:
    url: "https://github.com/grafana/loki/releases/download/v{{ loki_version }}/promtail-linux-amd64.zip"
    dest: /tmp/promtail.zip
    mode: "0644"

- name: Décompresser Promtail
  unarchive:
    src: /tmp/promtail.zip
    dest: /usr/local/bin/
    remote_src: true
  args:
    creates: /usr/local/bin/promtail-linux-amd64

- name: Lien symbolique promtail
  file:
    src: /usr/local/bin/promtail-linux-amd64
    dest: /usr/local/bin/promtail
    state: link

- name: Créer /etc/promtail
  file:
    path: /etc/promtail
    state: directory
    mode: "0755"

- name: Déployer promtail-config.yml
  template:
    src: "{{ playbook_dir }}/../monitoring/loki/promtail-config.yml"
    dest: /etc/promtail/config.yml
    mode: "0644"
  notify: restart promtail

- name: Déployer le service systemd Promtail
  template:
    src: promtail.service.j2
    dest: /etc/systemd/system/promtail.service
    mode: "0644"
  notify:
    - reload systemd
    - restart promtail

- name: Démarrer Promtail
  systemd:
    name: promtail
    state: started
    enabled: true
    daemon_reload: true
