---
- name: Appliquer les politiques de mot de passe par groupe
  shell: |
    echo "{{ ipa_admin_password }}" | kinit admin
    ipa pwpolicy-show {{ item.group }} 2>/dev/null && \
    ipa pwpolicy-mod {{ item.group }} \
      --minlife={{ item.minlife }} \
      --maxlife={{ item.maxlife }} \
      --minlength={{ item.minlength }} \
      --history={{ item.history }} \
      --minclasses={{ item.minclasses }} \
      --priority={{ item.priority }} || \
    ipa pwpolicy-add {{ item.group }} \
      --minlife={{ item.minlife }} \
      --maxlife={{ item.maxlife }} \
      --minlength={{ item.minlength }} \
      --history={{ item.history }} \
      --minclasses={{ item.minclasses }} \
      --priority={{ item.priority }}
  loop: "{{ ipa_password_policies }}"
  changed_when: false

- name: Créer les règles sudo
  shell: |
    echo "{{ ipa_admin_password }}" | kinit admin
    ipa sudorule-show "{{ item.name }}" 2>/dev/null || \
    ipa sudorule-add "{{ item.name }}" --desc="{{ item.description }}"
  loop: "{{ ipa_sudo_rules }}"
  changed_when: false

- name: Ajouter les groupes aux règles sudo
  shell: |
    ipa sudorule-add-user "{{ item.name }}" --groups={{ item.group }} 2>/dev/null || true
    ipa sudorule-add-host "{{ item.name }}" --hosts={{ item.hosts }} 2>/dev/null || true
  loop: "{{ ipa_sudo_rules }}"
  changed_when: false

- name: Désactiver la règle HBAC 'allow_all' par défaut (sécurité)
  shell: |
    echo "{{ ipa_admin_password }}" | kinit admin
    ipa hbacrule-disable allow_all 2>/dev/null || true
  changed_when: false

- name: Créer les règles HBAC par groupe
  shell: |
    ipa hbacrule-show "{{ item.name }}" 2>/dev/null || \
    ipa hbacrule-add "{{ item.name }}" --desc="{{ item.description }}"
  loop: "{{ ipa_hbac_rules }}"
  changed_when: false

- name: Affecter les groupes aux règles HBAC
  shell: |
    ipa hbacrule-add-user "{{ item.name }}" --groups={{ item.group }} 2>/dev/null || true
  loop: "{{ ipa_hbac_rules }}"
  changed_when: false

