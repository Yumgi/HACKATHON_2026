---
# FreeIPA — Rocky Linux 9 VM sur Proxmox

# ── 1. Prérequis système ───────────────────────────────────────────────────────

- name: Mettre à jour tous les paquets
  dnf:
    name: "*"
    state: latest
    update_cache: true
  tags: install

- name: Installer les dépendances de base
  dnf:
    name:
      - dnf-plugins-core
      - python3-libsemanage   # SELinux bindings Python
      - python3-policycoreutils
      - chrony
    state: present
  tags: install

- name: Activer le dépôt CRB (requis pour certaines dépendances IPA)
  command: dnf config-manager --set-enabled crb
  changed_when: false
  tags: install

- name: Rafraîchir le cache DNF
  command: dnf makecache
  changed_when: false
  tags: install

# ── 2. SELinux — permissive pour le hackathon ──────────────────────────────────
# En production : configurer les booleans SELinux IPA plutôt que désactiver

- name: Passer SELinux en mode permissive (runtime)
  command: setenforce 0
  changed_when: false
  failed_when: false  # Ignore si déjà permissive ou disabled
  tags: configure

- name: Passer SELinux en mode permissive (persistant)
  selinux:
    policy: targeted
    state: permissive
  tags: configure

# ── 3. NetworkManager — ne pas écraser /etc/resolv.conf après install IPA ──────

- name: Configurer NetworkManager pour ne pas gérer le DNS
  copy:
    dest: /etc/NetworkManager/conf.d/90-ipa-dns.conf
    content: |
      [main]
      dns=none
    mode: "0644"
  notify: restart networkmanager
  tags: configure

- name: S'assurer que chrony est démarré (Kerberos nécessite une horloge précise)
  systemd:
    name: chronyd
    state: started
    enabled: true
  tags: configure

# ── 4. Paquets FreeIPA ─────────────────────────────────────────────────────────

- name: Installer FreeIPA server + DNS + Python bindings
  dnf:
    name:
      - ipa-server
      - ipa-server-dns
      - bind
      - bind-dyndb-ldap
      - python3-ipalib
      - python3-ipaclient
    state: present
  tags: install

# ── 5. Hostname et /etc/hosts ──────────────────────────────────────────────────

- name: Configurer le hostname FQDN
  hostname:
    name: "ipa.{{ freeipa_domain }}"
  tags: configure

- name: Supprimer les entrées 127.x.x.x avec le FQDN (conflictuelles avec IPA)
  lineinfile:
    path: /etc/hosts
    regexp: "^127\\..*ipa\\.{{ freeipa_domain }}"
    state: absent
  tags: configure

- name: Ajouter l'entrée /etc/hosts avec l'IP réelle
  lineinfile:
    path: /etc/hosts
    line: "{{ freeipa_ip }} ipa.{{ freeipa_domain }} ipa"
    state: present
  tags: configure

# ── 6. Installation FreeIPA (idempotente) ─────────────────────────────────────

- name: Vérifier si FreeIPA est déjà configuré
  stat:
    path: /etc/ipa/default.conf
  register: ipa_installed
  tags: install

- name: Lancer ipa-server-install
  command: >-
    ipa-server-install
    --unattended
    --hostname=ipa.{{ freeipa_domain }}
    --realm={{ freeipa_realm }}
    --domain={{ freeipa_domain }}
    --ds-password={{ freeipa_ds_password }}
    --admin-password={{ freeipa_admin_password }}
    --setup-dns
    --auto-reverse
    {% for fw in freeipa_dns_forwarders %}--forwarder={{ fw }} {% endfor %}
    --no-ntp
    --mkhomedir
  when: not ipa_installed.stat.exists
  register: ipa_install_result
  changed_when: ipa_install_result.rc == 0
  no_log: true  # Masquer les mots de passe dans les logs
  tags: install

# ── 7. Service IPA ─────────────────────────────────────────────────────────────

- name: Démarrer et activer le service IPA
  systemd:
    name: ipa
    state: started
    enabled: true
  tags: configure

- name: Attendre que l'API IPA réponde (max 120s)
  uri:
    url: "https://ipa.{{ freeipa_domain }}/ipa/ui/"
    validate_certs: false
    status_code: 200
  retries: 12
  delay: 10
  register: ipa_api_check
  until: ipa_api_check.status == 200
  tags: configure

# ── 8. Firewalld ───────────────────────────────────────────────────────────────

- name: Activer les services FreeIPA dans firewalld
  firewalld:
    service: "{{ item }}"
    permanent: true
    state: enabled
    immediate: true
  loop:
    - freeipa-ldap
    - freeipa-ldaps
    - dns
    - http
    - https
    - ntp
  tags: configure

- name: Ouvrir les ports Kerberos
  firewalld:
    port: "{{ item }}"
    permanent: true
    state: enabled
    immediate: true
  loop:
    - "88/tcp"
    - "88/udp"
    - "464/tcp"
    - "464/udp"
  tags: configure

# ── 9. Groupes, utilisateurs, politiques ──────────────────────────────────────

- name: Créer les groupes ACME
  include_tasks: groups.yml
  tags: users

- name: Créer les utilisateurs ACME
  include_tasks: users.yml
  tags: users
