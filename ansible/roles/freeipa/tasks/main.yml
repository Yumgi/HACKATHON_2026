---
# FreeIPA — Rocky Linux 9 VM sur Proxmox

# ── 1. Prérequis système ───────────────────────────────────────────────────────

# Pas de dnf update global : les repos Rocky Linux 9 entrent en conflit avec
# certains paquets RHEL9 (redhat-release, openssl-fips-provider-so).
# On se contente de mettre à jour le cache.
- name: Mettre à jour le cache DNF
  dnf:
    update_cache: true
  tags: install

- name: Installer les dépendances de base
  dnf:
    name:
      - dnf-plugins-core
      - python3-libsemanage
      - python3-policycoreutils
      - chrony
      - firewalld
    state: present
  tags: install

# RHEL9 sans subscription = aucun repo. On utilise Rocky Linux 9 (rebuild
# binaire 1:1 de RHEL9) pour accéder à BaseOS, AppStream et CRB gratuitement.

- name: Importer la clé GPG Rocky Linux 9
  rpm_key:
    key: "https://dl.rockylinux.org/pub/rocky/RPM-GPG-KEY-Rocky-9"
    state: present
  tags: install

- name: Configurer les dépôts Rocky Linux 9
  yum_repository:
    name: "{{ item.name }}"
    description: "{{ item.description }}"
    baseurl: "{{ item.baseurl }}"
    gpgcheck: true
    gpgkey: "https://dl.rockylinux.org/pub/rocky/RPM-GPG-KEY-Rocky-9"
    enabled: true
    state: present
  loop:
    - name: rocky-baseos
      description: "Rocky Linux 9 - BaseOS"
      baseurl: "https://dl.rockylinux.org/pub/rocky/9/BaseOS/x86_64/os/"
    - name: rocky-appstream
      description: "Rocky Linux 9 - AppStream"
      baseurl: "https://dl.rockylinux.org/pub/rocky/9/AppStream/x86_64/os/"
    - name: rocky-crb
      description: "Rocky Linux 9 - CRB"
      baseurl: "https://dl.rockylinux.org/pub/rocky/9/CRB/x86_64/os/"
  tags: install

- name: Rafraîchir le cache DNF (tous les repos)
  command: dnf makecache
  changed_when: false
  tags: install

# ── 2. SELinux — permissive pour le hackathon ──────────────────────────────────
# En production : configurer les booleans SELinux IPA plutôt que désactiver

- name: Passer SELinux en mode permissive (runtime)
  command: setenforce 0
  changed_when: false
  failed_when: false  # Ignore si déjà permissive ou disabled
  tags: configure

- name: Passer SELinux en mode permissive (persistant)
  selinux:
    policy: targeted
    state: permissive
  tags: configure

# ── 3. NetworkManager — ne pas écraser /etc/resolv.conf après install IPA ──────

- name: Configurer NetworkManager pour ne pas gérer le DNS
  copy:
    dest: /etc/NetworkManager/conf.d/90-ipa-dns.conf
    content: |
      [main]
      dns=none
    mode: "0644"
  notify: restart networkmanager
  tags: configure

- name: S'assurer que chrony est démarré (Kerberos nécessite une horloge précise)
  systemd:
    name: chronyd
    state: started
    enabled: true
  tags: configure

# ── 4. Paquets FreeIPA ─────────────────────────────────────────────────────────

- name: Installer FreeIPA server + DNS + Python bindings
  dnf:
    name:
      - ipa-server
      - ipa-server-dns
      - bind
      - bind-dyndb-ldap
      - python3-ipalib
      - python3-ipaclient
    state: present
    allowerasing: true   # Résout les conflits RHEL9 vs Rocky Linux
  tags: install

# ── 5. Hostname et /etc/hosts ──────────────────────────────────────────────────

- name: Configurer le hostname FQDN
  hostname:
    name: "ipa.{{ freeipa_domain }}"
  tags: configure

- name: Supprimer les entrées 127.x.x.x avec le FQDN (conflictuelles avec IPA)
  lineinfile:
    path: /etc/hosts
    regexp: "^127\\..*ipa\\.{{ freeipa_domain }}"
    state: absent
  tags: configure

- name: Ajouter l'entrée /etc/hosts avec l'IP réelle
  lineinfile:
    path: /etc/hosts
    line: "{{ freeipa_ip }} ipa.{{ freeipa_domain }} ipa"
    state: present
  tags: configure

# ── 6. Installation FreeIPA (idempotente) ─────────────────────────────────────

# Vérifie si l'instance 389-DS (LDAP) existe — preuve qu'IPA a bien été installé
# /etc/ipa/default.conf seul n'est pas suffisant (créé même si l'install échoue)
- name: Vérifier si l'instance 389-DS est configurée
  stat:
    path: "/etc/dirsrv/slapd-{{ freeipa_realm | replace('.', '-') }}"
  register: ipa_ds_instance
  tags: install

# Si /etc/ipa/default.conf existe mais pas l'instance DS → installation partielle
# On nettoie pour repartir sur une base saine
- name: Détecter une installation partielle (default.conf sans instance DS)
  stat:
    path: /etc/ipa/default.conf
  register: ipa_conf_file
  tags: install

- name: Nettoyer une installation partielle si nécessaire
  command: ipa-server-install --uninstall --unattended
  when:
    - ipa_conf_file.stat.exists
    - not ipa_ds_instance.stat.exists
  failed_when: false
  changed_when: true
  tags: install

- name: Lancer ipa-server-install
  command: >-
    ipa-server-install
    --unattended
    --hostname=ipa.{{ freeipa_domain }}
    --realm={{ freeipa_realm }}
    --domain={{ freeipa_domain }}
    --ds-password={{ freeipa_ds_password }}
    --admin-password={{ freeipa_admin_password }}
    --setup-dns
    --auto-reverse
    {% for fw in freeipa_dns_forwarders %}--forwarder={{ fw }} {% endfor %}
    --no-ntp
    --mkhomedir
  when: not ipa_ds_instance.stat.exists
  register: ipa_install_result
  changed_when: ipa_install_result.rc == 0
  tags: install

- name: Afficher la sortie si ipa-server-install a échoué
  debug:
    msg: "{{ ipa_install_result.stdout_lines | default([]) + ipa_install_result.stderr_lines | default([]) }}"
  when:
    - ipa_install_result is not skipped
    - ipa_install_result.rc is defined
    - ipa_install_result.rc != 0
  tags: install

# ── 7. Service IPA ─────────────────────────────────────────────────────────────

- name: Activer le service IPA au démarrage
  systemd:
    name: ipa
    enabled: true
    daemon_reload: true
  tags: configure

- name: Démarrer le service IPA via ipactl (plus fiable que systemd direct)
  command: ipactl start
  register: ipactl_start
  changed_when: "'already running' not in ipactl_start.stdout"
  failed_when: ipactl_start.rc != 0 and 'already running' not in ipactl_start.stdout
  tags: configure

- name: Attendre que l'API IPA réponde (max 120s)
  uri:
    url: "https://ipa.{{ freeipa_domain }}/ipa/ui/"
    validate_certs: false
    status_code: 200
  retries: 12
  delay: 10
  register: ipa_api_check
  until: ipa_api_check.status == 200
  tags: configure

# ── 8. Firewalld ───────────────────────────────────────────────────────────────

- name: Activer les services FreeIPA dans firewalld
  firewalld:
    service: "{{ item }}"
    permanent: true
    state: enabled
    immediate: true
  loop:
    - freeipa-ldap
    - freeipa-ldaps
    - dns
    - http
    - https
    - ntp
  tags: configure

- name: Ouvrir les ports Kerberos
  firewalld:
    port: "{{ item }}"
    permanent: true
    state: enabled
    immediate: true
  loop:
    - "88/tcp"
    - "88/udp"
    - "464/tcp"
    - "464/udp"
  tags: configure

# ── 9. Groupes, utilisateurs, politiques ──────────────────────────────────────

- name: Créer les groupes ACME
  include_tasks: groups.yml
  tags: users

- name: Créer les utilisateurs ACME
  include_tasks: users.yml
  tags: users
