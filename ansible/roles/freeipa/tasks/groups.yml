---
# Authentification Kerberos admin avant toute commande ipa
- name: Obtenir le ticket Kerberos admin
  shell: echo "{{ freeipa_admin_password }}" | kinit admin
  changed_when: false
  no_log: true

# ── Groupes ───────────────────────────────────────────────────────────────────
# ipa group-show retourne 0 si le groupe existe, 2 sinon → idempotent

- name: Créer le groupe acme-admins
  shell: ipa group-show acme-admins 2>/dev/null || ipa group-add acme-admins --desc="Administrateurs ACME Corp"
  changed_when: false
  register: result_admins

- name: Créer le groupe acme-users
  shell: ipa group-show acme-users 2>/dev/null || ipa group-add acme-users --desc="Utilisateurs standard ACME Corp"
  changed_when: false

- name: Créer le groupe acme-readonly
  shell: ipa group-show acme-readonly 2>/dev/null || ipa group-add acme-readonly --desc="Accès lecture seule ACME Corp"
  changed_when: false

# ── Politiques de mot de passe ────────────────────────────────────────────────

- name: Appliquer les politiques de mot de passe
  shell: |
    if ipa pwpolicy-show {{ item.group }} 2>/dev/null; then
      ipa pwpolicy-mod {{ item.group }} \
        --minlife={{ item.minlife }} \
        --maxlife={{ item.maxlife }} \
        --minlength={{ item.minlength }} \
        --history={{ item.history }} \
        --minclasses={{ item.minclasses }} \
        --priority={{ item.priority }}
    else
      ipa pwpolicy-add {{ item.group }} \
        --minlife={{ item.minlife }} \
        --maxlife={{ item.maxlife }} \
        --minlength={{ item.minlength }} \
        --history={{ item.history }} \
        --minclasses={{ item.minclasses }} \
        --priority={{ item.priority }}
    fi
  changed_when: false
  loop: "{{ ipa_password_policies }}"
