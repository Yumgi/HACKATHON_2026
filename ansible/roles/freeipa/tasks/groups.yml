---
# freeipa.ansible_freeipa.ipagroup — collection officielle Red Hat
# Les modules s'exécutent sur le serveur IPA lui-même via l'API locale

- name: Créer le groupe acme-admins
  freeipa.ansible_freeipa.ipagroup:
    ipaadmin_password: "{{ freeipa_admin_password }}"
    name: acme-admins
    description: "Administrateurs ACME Corp"
    state: present

- name: Créer le groupe acme-users
  freeipa.ansible_freeipa.ipagroup:
    ipaadmin_password: "{{ freeipa_admin_password }}"
    name: acme-users
    description: "Utilisateurs standard ACME Corp"
    state: present

- name: Créer le groupe acme-readonly
  freeipa.ansible_freeipa.ipagroup:
    ipaadmin_password: "{{ freeipa_admin_password }}"
    name: acme-readonly
    description: "Accès lecture seule ACME Corp"
    state: present

- name: Appliquer les politiques de mot de passe par groupe
  freeipa.ansible_freeipa.ipapwpolicy:
    ipaadmin_password: "{{ freeipa_admin_password }}"
    name: "{{ item.group }}"
    minlife: "{{ item.minlife }}"
    maxlife: "{{ item.maxlife }}"
    minlength: "{{ item.minlength }}"
    history: "{{ item.history }}"
    minclasses: "{{ item.minclasses }}"
    priority: "{{ item.priority }}"
    state: present
  loop: "{{ ipa_password_policies }}"
