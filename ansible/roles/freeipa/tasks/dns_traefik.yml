---
# DNS split-horizon : tous les noms de services pointent vers Traefik (10.30.0.10)
# en interne, que ce soit du .tech ou du .lan

- name: Obtenir le ticket Kerberos admin
  shell: echo "{{ freeipa_admin_password }}" | kinit admin
  changed_when: false
  no_log: true

- name: Créer la zone DNS {{ domain_ext }}
  shell: |
    ipa dnszone-show {{ domain_ext }} 2>/dev/null || \
    ipa dnszone-add {{ domain_ext }} --admin-email=admin@{{ freeipa_domain }}
  changed_when: false

- name: Créer la zone DNS {{ domain_lan }}
  shell: |
    ipa dnszone-show {{ domain_lan }} 2>/dev/null || \
    ipa dnszone-add {{ domain_lan }} --admin-email=admin@{{ freeipa_domain }}
  changed_when: false

- name: Créer les enregistrements A pour les services .tech (→ Traefik {{ traefik_ip }})
  shell: |
    ipa dnsrecord-show {{ domain_ext }} {{ item }} 2>/dev/null || \
    ipa dnsrecord-add {{ domain_ext }} {{ item }} --a-rec={{ traefik_ip }}
  changed_when: false
  loop:
    - grafana
    - prometheus
    - loki
    - bareos
    - ipa
    - pfsense
    - traefik

- name: Créer l'enregistrement A pour intranet.{{ domain_lan }}
  shell: |
    ipa dnsrecord-show {{ domain_lan }} intranet 2>/dev/null || \
    ipa dnsrecord-add {{ domain_lan }} intranet --a-rec={{ traefik_ip }}
  changed_when: false
