---
- name: Install bareos-filedaemon
  ansible.builtin.package:
    name: bareos-filedaemon
    state: present

- name: Ensure bareos fd config directory exists
  ansible.builtin.file:
    path: "{{ bareos_fd_conf_path }}/director"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy bareos-fd director config
  ansible.builtin.template:
    src: bareos-fd.conf.j2
    dest: "{{ bareos_fd_conf_path }}/director/bareos-dir.conf"
    owner: root
    group: root
    mode: "0640"
  notify: Restart bareos fd

- name: Ensure restore proof directory exists
  ansible.builtin.file:
    path: /opt/restore-proof
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create restore proof file
  ansible.builtin.copy:
    dest: /opt/restore-proof/proof.txt
    content: |
      Bareos restore proof for {{ inventory_hostname }}
      Generated by Ansible.
    owner: root
    group: root
    mode: "0644"

- name: Ensure bareos-filedaemon is enabled and started
  ansible.builtin.service:
    name: bareos-filedaemon
    state: started
    enabled: true
