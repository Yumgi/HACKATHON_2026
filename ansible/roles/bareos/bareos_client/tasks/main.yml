---
# ── Installation bareos-filedaemon selon l'OS ─────────────────────────────────

- name: Créer /etc/apt/keyrings (Debian/Ubuntu)
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  when: ansible_os_family == "Debian"
  tags: install

- name: Télécharger la clé GPG Bareos (Debian 12)
  get_url:
    url: "https://download.bareos.org/current/Debian_12/Release.key"
    dest: /etc/apt/keyrings/bareos.asc
    mode: "0644"
  when:
    - ansible_os_family == "Debian"
    - ansible_distribution_release == "bookworm"
  tags: install

- name: Ajouter le dépôt Bareos Debian 12
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/bareos.asc] https://download.bareos.org/current/Debian_12/ /"
    state: present
    filename: bareos
  when:
    - ansible_os_family == "Debian"
    - ansible_distribution_release == "bookworm"
  tags: install

- name: Installer bareos-filedaemon (Debian/Ubuntu)
  apt:
    name: bareos-filedaemon
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"
  tags: install

- name: Importer la clé GPG Bareos (RHEL/Rocky)
  rpm_key:
    key: "https://download.bareos.org/current/EL_9/Release.key"
    state: present
  when: ansible_os_family == "RedHat"
  tags: install

- name: Ajouter le dépôt Bareos EL9 (Rocky/RHEL)
  yum_repository:
    name: bareos
    description: "Bareos EL9"
    baseurl: "https://download.bareos.org/current/EL_9/"
    gpgcheck: true
    gpgkey: "https://download.bareos.org/current/EL_9/Release.key"
    enabled: true
    state: present
  when: ansible_os_family == "RedHat"
  tags: install

- name: Installer bareos-filedaemon (RHEL/Rocky)
  dnf:
    name: bareos-filedaemon
    state: present
  when: ansible_os_family == "RedHat"
  tags: install

# ── Configuration ──────────────────────────────────────────────────────────────

- name: Créer le répertoire de config FD director
  file:
    path: "{{ bareos_fd_conf_path }}/director"
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags: configure

- name: Déployer la config bareos-fd (autorisation du Director)
  template:
    src: bareos-fd.conf.j2
    dest: "{{ bareos_fd_conf_path }}/director/bareos-dir.conf"
    owner: root
    group: bareos
    mode: "0640"
  notify: Restart bareos fd
  tags: configure

- name: Créer le répertoire restore-proof
  file:
    path: /opt/restore-proof
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags: configure

- name: Déposer le fichier restore-proof
  copy:
    dest: /opt/restore-proof/proof.txt
    content: |
      Bareos restore proof — {{ inventory_hostname }}
      Date de génération : {{ ansible_date_time.date }}
    owner: root
    group: root
    mode: "0644"
  tags: configure

# ── Démarrage ─────────────────────────────────────────────────────────────────

- name: Appliquer les handlers
  meta: flush_handlers
  tags: configure

- name: Démarrer bareos-filedaemon
  systemd:
    name: bareos-filedaemon
    state: started
    enabled: true
    daemon_reload: true
  tags: configure
