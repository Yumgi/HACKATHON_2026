---
# Variables globales ACME Corp

domain: acme.local
domain_dc: "dc=acme,dc=local"

# ── Domaines publics / privés (Traefik TLS) ───────────────────────────────────
domain_ext: "grp1.hackathon-ESGI-2026.tech"   # Let's Encrypt HTTP-01 (public)
domain_lan: "grp1.hackathon-ESGI-2026.lan"    # self-signed (réseau interne)

# ── Réseau ────────────────────────────────────────────────────────────────────
network_lan:     "10.10.0.0/24"   # VLAN 10 — postes utilisateurs (pfSense LAN)
network_servers: "10.20.0.0/24"   # VLAN 20 — containers SERVERS  (vmbr2)
network_dmz:     "10.30.0.0/24"   # VLAN 30 — containers DMZ      (vmbr3)

gateway_lan:     "10.10.0.1"
gateway_servers: "10.20.0.1"
gateway_dmz:     "10.30.0.1"

# ── IPs des services (alignées sur terraform) ─────────────────────────────────
freeipa_ip:    "10.20.0.10"   # CT 101 — Rocky Linux 9
postgresql_ip: "10.20.0.20"   # CT 102 — Debian 12
prometheus_ip: "10.20.0.40"   # CT 104 — Debian 12
grafana_ip:    "10.20.0.41"   # CT 105 — Ubuntu 22.04
loki_ip:       "10.20.0.42"   # CT 106 — Debian 12
bareos_ip:     "10.20.0.50"   # CT 107 — Ubuntu 22.04
traefik_ip:    "10.30.0.10"   # CT 201 — Debian 12

# ── FreeIPA (Rocky Linux 9) ───────────────────────────────────────────────────
freeipa_realm:        "ACME.LOCAL"
freeipa_domain:       "acme.local"
freeipa_server_fqdn:  "ipa.acme.local"     # FQDN interne IPA (ne pas changer)
freeipa_public_fqdn:  "ipa.{{ domain_ext }}"   # Route Traefik publique
freeipa_admin_user:   "admin"
freeipa_admin_password: "{{ vault_freeipa_admin_password }}"
freeipa_ds_password:    "{{ vault_freeipa_ds_password }}"

ipa_password_policies:
  - group: acme-admins
    minlife: 1
    maxlife: 60
    minlength: 12
    history: 5
    minclasses: 3
    priority: 10
  - group: acme-users
    minlife: 1
    maxlife: 90
    minlength: 8
    history: 3
    minclasses: 2
    priority: 20

# ── PostgreSQL ────────────────────────────────────────────────────────────────
postgresql_version: "15"
postgresql_app_db:   "acme_app"
postgresql_app_user: "acme"
postgresql_app_password: "{{ vault_postgresql_app_password }}"

# ── Grafana ───────────────────────────────────────────────────────────────────
grafana_admin_password: "{{ vault_grafana_admin_password }}"
grafana_domain:         "grafana.{{ domain_ext }}"

# ── Loki ──────────────────────────────────────────────────────────────────────
loki_port: 3100

# ── Bareos ────────────────────────────────────────────────────────────────────
bareos_webui_password: "{{ vault_bareos_webui_password }}"

# ── Traefik / TLS ─────────────────────────────────────────────────────────────
# Email réel requis pour Let's Encrypt (ACME)
certbot_email: "admin@grp1.hackathon-ESGI-2026.tech"

# Domaines publics — Let's Encrypt HTTP-01 (port 80 doit être joignable depuis WAN)
certbot_domains:
  - "grafana.grp1.hackathon-ESGI-2026.tech"
  - "prometheus.grp1.hackathon-ESGI-2026.tech"
  - "traefik.grp1.hackathon-ESGI-2026.tech"
  - "loki.grp1.hackathon-ESGI-2026.tech"
  - "bareos.grp1.hackathon-ESGI-2026.tech"
  - "ipa.grp1.hackathon-ESGI-2026.tech"
  - "pfsense.grp1.hackathon-ESGI-2026.tech"

# Basic-auth Traefik dashboard (généré par le template htpasswd.j2)
traefik_dashboard_user: "admin"
traefik_dashboard_password: "{{ vault_traefik_dashboard_password }}"
