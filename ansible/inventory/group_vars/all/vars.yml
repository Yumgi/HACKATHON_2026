---
# Variables globales ACME Corp

domain: acme.local
domain_dc: "dc=acme,dc=local"

# ── Domaines publics / privés (Traefik TLS) ───────────────────────────────────
domain_ext: "grp1.hackathon-ESGI-2026.tech"
domain_lan: "grp1.hackathon-ESGI-2026.lan"

# ── Réseau ────────────────────────────────────────────────────────────────────
network_lan:     "10.10.0.0/24"
network_servers: "10.20.0.0/24"
network_dmz:     "10.30.0.0/24"

gateway_lan:     "10.10.0.1"
gateway_servers: "10.20.0.1"
gateway_dmz:     "10.30.0.1"

# ── IPs des services ──────────────────────────────────────────────────────────
freeipa_ip:    "10.20.0.10"
postgresql_ip: "10.20.0.20"
prometheus_ip: "10.20.0.40"
grafana_ip:    "10.20.0.41"
loki_ip:       "10.20.0.42"
bareos_ip:     "10.20.0.50"
traefik_ip:    "10.30.0.10"

# ── FreeIPA ───────────────────────────────────────────────────────────────────
freeipa_realm:        "ACME.LOCAL"
freeipa_domain:       "acme.local"
freeipa_server_fqdn:  "ipa.acme.local"
freeipa_public_fqdn:  "ipa.{{ domain_ext }}"
freeipa_admin_user:   "admin"
freeipa_admin_password: "{{ vault_freeipa_admin_password }}"
freeipa_ds_password:    "{{ vault_freeipa_ds_password }}"

ipa_password_policies:
  - group: acme-admins
    minlife: 1
    maxlife: 60
    minlength: 12
    history: 5
    minclasses: 3
    priority: 10
  - group: acme-users
    minlife: 1
    maxlife: 90
    minlength: 8
    history: 3
    minclasses: 2
    priority: 20

# ── PostgreSQL ────────────────────────────────────────────────────────────────
postgresql_version: "15"
postgresql_app_db:   "acme_app"
postgresql_app_user: "acme"
postgresql_app_password: "{{ vault_postgresql_app_password }}"

# ── Grafana ───────────────────────────────────────────────────────────────────
grafana_admin_password: "{{ vault_grafana_admin_password }}"
grafana_domain:         "grafana.{{ domain_ext }}"

# ── Loki ──────────────────────────────────────────────────────────────────────
loki_port: 3100

# ── Bareos ────────────────────────────────────────────────────────────────────
bareos_webui_password: "{{ vault_bareos_webui_password }}"
bareos_db_password:    "{{ vault_bareos_db_password }}"

# ── Traefik / TLS ─────────────────────────────────────────────────────────────
certbot_email: "admin@grp1.hackathon-ESGI-2026.tech"

certbot_domains:
  - "grafana.grp1.hackathon-ESGI-2026.tech"
  - "prometheus.grp1.hackathon-ESGI-2026.tech"
  - "traefik.grp1.hackathon-ESGI-2026.tech"
  - "loki.grp1.hackathon-ESGI-2026.tech"
  - "bareos.grp1.hackathon-ESGI-2026.tech"
  - "ipa.grp1.hackathon-ESGI-2026.tech"
  - "pfsense.grp1.hackathon-ESGI-2026.tech"

traefik_dashboard_user: "admin"
traefik_dashboard_password: "{{ vault_traefik_dashboard_password }}"
